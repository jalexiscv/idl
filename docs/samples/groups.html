<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Groups & Subgraphs — IDL Samples</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    nav { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 20px; }
    nav a { color: #8ab4f8; text-decoration: none; font-size: 13px; }
    nav h2 { font-size: 16px; font-weight: 500; }
    #diagramDiv { width: 100%; height: 520px; background: #fff; border-bottom: 1px solid #ddd; }
    .info { max-width: 800px; margin: 20px auto; padding: 0 20px; }
    .info pre { background: #1a1a2e; color: #e0e0e0; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 12px; margin-top: 12px; }
    .info h3 { margin-top: 20px; font-size: 15px; }
    .info p { color: #666; font-size: 13px; line-height: 1.6; margin-top: 6px; }
  </style>
</head>
<body>
<nav>
  <a href="index.html">← Samples</a>
  <h2>Groups & Subgraphs</h2>
</nav>
<div id="diagramDiv"></div>
<div class="info">
  <h3>About this sample</h3>
  <p>Grupos colapsables que contienen nodos y subgrafos anidados. Cada grupo tiene un <code>Placeholder</code> y paneles de encabezado. Los grupos se pueden expandir/colapsar y mover.</p>
</div>
<script src="../idl.js"></script>
<script>
  var diagram = new idl.Diagram("diagramDiv");

  diagram.groupTemplate = new idl.Group("Vertical", {
    selectionAdorned: true,
    ungroupable: true,
  })
    .add(
      new idl.Panel("Auto")
        .add(
          new idl.Shape("RoundedRectangle", {
            fill: "rgba(128,128,128,0.1)",
            stroke: "#999", strokeWidth: 1.5, parameter1: 8
          }),
          new idl.Placeholder("", { padding: 20 })
        ),
      new idl.Panel("Horizontal", { defaultAlignment: idl.Spot.Left })
        .add(
          new idl.Shape("", {
            width: 10, height: 10, margin: 4
          }).bind("fill", "color"),
          new idl.TextBlock("", {
            font: "bold 12px sans-serif", margin: 4, editable: true
          }).bind("text", "text")
        )
    );

  diagram.nodeTemplate = new idl.Node("Spot")
    .add(
      new idl.Shape("RoundedRectangle", {
        width: 80, height: 32, parameter1: 4, strokeWidth: 1.5
      }).bind("fill", "color").bind("stroke", "color"),
      new idl.TextBlock("", {
        font: "11px sans-serif", stroke: "white", textAlign: "center"
      }).bind("text", "text")
    );

  diagram.linkTemplate = new idl.Link({ routing: idl.Link.Normal })
    .add(new idl.Shape("", { stroke: "#999", strokeWidth: 1.5 }))
    .add(new idl.Shape("", { toArrow: "Standard", stroke: "#999", fill: "#999", scale: 1 }));

  diagram.model = new idl.GraphLinksModel({
    nodeDataArray: [
      { key: 1, text: "Frontend", isGroup: true, color: "#3498DB" },
      { key: 11, text: "React", group: 1, color: "#61DAFB" },
      { key: 12, text: "CSS", group: 1, color: "#2965F1" },
      { key: 2, text: "Backend", isGroup: true, color: "#2ECC71" },
      { key: 21, text: "API", group: 2, color: "#27AE60" },
      { key: 22, text: "DB", group: 2, color: "#1ABC9C" },
      { key: 23, text: "Auth", group: 2, color: "#16A085" },
      { key: 3, text: "DevOps", isGroup: true, color: "#E74C3C" },
      { key: 31, text: "CI/CD", group: 3, color: "#C0392B" },
      { key: 32, text: "Monitor", group: 3, color: "#E67E22" },
    ],
    linkDataArray: [
      { from: 11, to: 21 },
      { from: 21, to: 23 },
      { from: 22, to: 21 },
      { from: 31, to: 21 },
      { from: 32, to: 31 },
    ]
  });
</script>
</body>
</html>
